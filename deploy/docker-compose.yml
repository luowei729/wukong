# wukong 监控系统 - Docker Compose
# 用法: docker compose -f deploy/docker-compose.yml up -d
# 密码和 JWT 密钥不设时自动生成，查看日志获取

services:
  wukong:
    image: ghcr.io/luowei729/wukong:latest
    container_name: wukong
    restart: unless-stopped
    ports:
      - "64443:64443"
    # 不用设环境变量也能启动（密码和 JWT 自动生成）
    # 生产环境建议显式设置：
    # environment:
    #   - WUKONG_ADMIN_PASSWORD=你的密码
    #   - WUKONG_JWT_SECRET=32位随机密钥
    volumes:
      - wukong-data:/opt/wukong/data

volumes:
  wukong-data: