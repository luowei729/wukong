# wukong 监控系统 - nginx 反代配置示例
# 生成时间: 2026-06-21 (北京时间)
# 用法:
#   1. 将域名 SSL 证书放到 /etc/nginx/ssl/ 目录
#   2. 复制本文件到 /etc/nginx/conf.d/wukong.conf
#   3. 修改 server_name 为你的实际域名
#   4. nginx -t && systemctl reload nginx

# --- HTTP 80 -> HTTPS 443 重定向 ---
server {
    listen 80;
    server_name wukong.example.com;  # ← 修改为你的域名
    return 301 https://$host$request_uri;
}

# --- HTTPS 443 主入口 ---
server {
    listen 443 ssl http2;
    server_name wukong.example.com;  # ← 修改为你的域名

    # SSL 证书配置
    ssl_certificate     /etc/nginx/ssl/wukong.crt;   # ← 修改为你的证书路径
    ssl_certificate_key /etc/nginx/ssl/wukong.key;   # ← 修改为你的密钥路径
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 最大请求体（Logo 上传需要）
    client_max_body_size 10M;

    # ==========================================
    # gRPC 探针双向流
    # 探针通过此路径与主控建立长连接
    # ==========================================
    location /wukong.AgentService/ {
        grpc_pass grpc://127.0.0.1:64443;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_read_timeout 86400s;  # 长连接超时（24小时）
        grpc_send_timeout 86400s;
    }

    # ==========================================
    # Web API (REST) + SSE 实时推送
    # ==========================================
    location /api/ {
        proxy_pass http://127.0.0.1:64443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键配置: 关闭缓冲，保持长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # HTTP/1.1 长连接（SSE 需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==========================================
    # 上传文件访问（Logo 等）
    # ==========================================
    location /uploads/ {
        alias /opt/wukong/data/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # 前端 SPA（Vue3 单页应用）
    # 所有非 API 路径 fallback 到 index.html
    # ==========================================
    location / {
        proxy_pass http://127.0.0.1:64443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 页面和静态资源也不缓存，避免发布新版本后浏览器继续使用旧 JS/CSS 导致白屏或数据不刷新。
        proxy_buffering off;
        proxy_cache off;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}